kind = "web"
previewPath = "/"
title = "Vendorkart - B2B Multi-Vendor Marketplace"
version = "1.0.0"
id = "artifacts/vendorkart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18177

[services.development]
run = "pnpm --filter @workspace/vendorkart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vendorkart", "run", "build" ]
publicDir = "artifacts/vendorkart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18177"
BASE_PATH = "/"
