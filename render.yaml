# Render Blueprint (optional): connect the repo and use "Apply blueprint", or create a Web Service manually
# and paste the build/start commands from your Render dashboard.
services:
  - type: web
    name: vendorkart
    runtime: node
    plan: starter
    # Do not use `corepack enable` on Render — the image has a read-only /usr/bin (EROFS on pnpm symlink).
    buildCommand: npx pnpm@10.33.0 install --frozen-lockfile && npx pnpm@10.33.0 run build:render
    startCommand: npm run start:render
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "22.16.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
